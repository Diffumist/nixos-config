name: Build NixOS ISO

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-iso:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: DeterminateSystems/flake-checker-action@main
      - name: Build NixOS ISO
        run: |
          nix build .#nixosConfigurations.nixiso.config.system.build.isoImage

      - name: Get ISO filename
        id: iso-info
        run: |
          ISO_PATH=$(find ./result/iso -name "*.iso" | head -n 1)
          ISO_NAME=$(basename "$ISO_PATH")
          echo "iso_path=$ISO_PATH" >> $GITHUB_OUTPUT
          echo "iso_name=$ISO_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.run_number }}
          release_name: NixOS ISO Build ${{ github.run_number }}
          draft: false
          prerelease: true

      - name: Upload ISO to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.iso-info.outputs.iso_path }}
          asset_name: ${{ steps.iso-info.outputs.iso_name }}
          asset_content_type: application/octet-stream
